<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>군수품 음식물 조달시장</title>
<style>
:root{--navy:#0f2747;--blue:#2563eb;--text:#111827;--dim:#64748b;--line:#dbe4ef;--soft:#f8fafc;--green:#087f5b;--amber:#b45309;--sans:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:#f7f9fc;color:var(--text);font-family:var(--sans)}button,select,input{font:inherit}a{font:inherit;text-decoration:none;text-align:center}.shell{max-width:1380px;margin:auto;padding:20px 16px 60px}.market-nav{display:grid;grid-template-columns:1fr 1fr;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 24px rgba(15,39,71,.06)}.market-btn{border:0;background:#fff;padding:22px 16px;font-size:20px;font-weight:900;color:#64748b;cursor:pointer}.market-btn+ .market-btn{border-left:1px solid var(--line)}.market-btn.active{background:var(--navy);color:#fff}.header{padding:24px 2px 16px}.header h1{margin:0;color:var(--navy);font-size:30px}.meta{margin-top:7px;color:var(--dim);font-size:13px}.controls{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}.year{padding:10px 38px 10px 12px;border:1px solid #cbd5e1;border-radius:9px;font-weight:800;color:var(--navy)}.seg{display:flex;gap:6px;flex-wrap:wrap}.chip,.stage-btn{border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:999px;padding:9px 15px;font-weight:800;cursor:pointer}.chip.active{background:#e8f0ff;border-color:#93b4dc;color:var(--blue)}.stage-nav{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stage-btn{border-radius:10px;padding:13px}.stage-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}.summary-title{font-size:14px;font-weight:900;color:var(--navy);margin:22px 0 10px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:17px;min-height:108px}.card .label{font-size:12px;color:var(--dim);font-weight:800}.card .value{font:900 25px var(--mono);color:var(--navy);margin-top:9px}.card .sub{font-size:11px;color:var(--dim);margin-top:5px}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;margin-top:16px;overflow:hidden}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}.panel-head h2{margin:0;color:var(--navy);font-size:17px}.panel-head p{margin:3px 0 0;color:var(--dim);font-size:12px}.search{width:min(340px,100%);padding:9px 11px;border:1px solid #cbd5e1;border-radius:9px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:900px}.table th,.table td{padding:12px 10px;border-bottom:1px solid #edf2f7;text-align:left;font-size:12px;vertical-align:middle}.table th{background:#f8fafc;color:#475569;font-weight:900;position:sticky;top:0;text-align:center;white-space:nowrap}.table th.sortable{cursor:pointer;user-select:none}.table th.sortable:hover{background:#eef4fb}.sort-mark{margin-left:4px;color:#94a3b8;font-size:10px}.title-cell{font-weight:800;color:var(--navy);max-width:430px}.clickable{color:var(--blue);cursor:pointer;text-decoration:underline;text-decoration-color:#bfdbfe;text-underline-offset:3px}.num{text-align:right!important;font-family:var(--mono);font-weight:800;white-space:nowrap}.action{border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:8px;padding:7px 10px;font-weight:900;cursor:pointer;white-space:nowrap}.choice-modal{position:fixed;inset:0;display:none;z-index:80;align-items:center;justify-content:center}.choice-modal.open{display:flex}.choice-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.4)}.choice-box{position:relative;width:min(380px,calc(100vw - 32px));background:#fff;border-radius:16px;padding:22px;box-shadow:0 24px 60px rgba(15,23,42,.25)}.choice-box h3{margin:0 0 8px;color:var(--navy)}.choice-box p{margin:0 0 18px;color:var(--dim);font-size:13px;line-height:1.5}.choice-actions{display:grid;gap:8px}.choice-btn{border:1px solid #cbd5e1;background:#fff;border-radius:9px;padding:11px;font-weight:900;cursor:pointer}.choice-btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}.choice-btn.blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}.empty{text-align:center;padding:45px!important;color:var(--dim)}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:9px;font-size:13px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.drawer{position:fixed;inset:0;display:none;z-index:50}.drawer.open{display:block}.backdrop{position:absolute;inset:0;background:rgba(15,23,42,.35)}.drawer-panel{position:absolute;right:0;top:0;bottom:0;width:min(540px,94vw);background:#fff;box-shadow:-18px 0 45px rgba(15,23,42,.18);overflow:auto}.drawer-head{padding:20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.drawer-head h3{margin:0;color:var(--navy)}.close{border:0;background:#f1f5f9;border-radius:8px;width:36px;height:36px;font-size:22px;cursor:pointer}.drawer-body{padding:18px}.drawer-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.mini{border:1px solid var(--line);border-radius:10px;padding:12px}.mini b{display:block;font:900 18px var(--mono);margin-top:4px}.recent{margin-top:16px}.recent-item{padding:11px 0;border-top:1px solid var(--line)}.recent-title{font-weight:800;color:var(--navy)}.recent-meta{font-size:12px;color:var(--dim);margin-top:3px}@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.shell{padding:10px 8px 40px}.market-btn{font-size:17px;padding:17px 8px}.header h1{font-size:24px}.stage-nav{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.controls{align-items:stretch}.year{width:100%}.panel-head{display:block}.search{margin-top:10px;width:100%}}
</style></head><body><main class="shell">
<nav class="market-nav"><a class="market-btn" data-market="군수품" href="military.html">군수품</a><a class="market-btn" data-market="나라장터" href="g2b.html">나라장터</a></nav>
<header class="header"><h1 id="pageTitle">군수품 음식물 조달</h1><div class="meta" id="updated">데이터 불러오는 중...</div></header>
<section class="controls"><select id="year" class="year"></select><div class="seg"><button class="chip active" data-view="equipment">장비</button><button class="chip" data-view="service">처리용역</button><button class="chip" data-view="all">전체</button></div></section>
<nav class="stage-nav"><button class="stage-btn active" data-source="발주계획">발주계획</button><button class="stage-btn" data-source="공고">공고</button><button class="stage-btn" data-source="계약정보">계약정보</button></nav>
<div class="summary-title">요약</div><section class="cards" id="cards"></section>
<section class="panel"><div class="panel-head"><div><h2 id="listTitle">세부 내역</h2><p id="listSub">최근순으로 표시합니다.</p></div><input id="search" class="search" placeholder="사업명, 기관, 업체명 검색"></div><div class="table-wrap"><table class="table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></section>
</main><div class="toast" id="toast">복사되었습니다.</div><div class="choice-modal" id="choiceModal"><div class="choice-backdrop" onclick="closeChoice()"></div><div class="choice-box"><h3>바로가기</h3><p id="choiceTitle"></p><div class="choice-actions"><button class="choice-btn primary" onclick="runChoice('copygo')">복사 후 이동</button><button class="choice-btn blue" onclick="runChoice('go')">이동</button><button class="choice-btn" onclick="closeChoice()">취소</button></div></div></div>
<div class="drawer" id="drawer"><div class="backdrop" onclick="closeDrawer()"></div><aside class="drawer-panel"><div class="drawer-head"><h3 id="drawerTitle"></h3><button class="close" onclick="closeDrawer()">×</button></div><div class="drawer-body" id="drawerBody"></div></aside></div>
<script>
const FIXED_MARKET='군수품';
let DATA={records:[],years:[]};let state={sortKey:'date',sortDir:'desc',market:FIXED_MARKET,source:'발주계획',view:'equipment',year:'',q:''};const now=new Date();
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const won=n=>{n=Number(n)||0;if(!n)return '-';if(n>=1e8)return (n/1e8).toLocaleString('ko-KR',{maximumFractionDigits:1})+'억원';if(n>=1e4)return Math.round(n/1e4).toLocaleString()+'만원';return n.toLocaleString()+'원'};
const fmt=d=>{d=String(d||'');if(d.length>=8)return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;if(d.length>=6)return `${d.slice(0,4)}.${d.slice(4,6)}`;return '-'};
function viewMatch(r){if(state.view==='all')return true;if(state.view==='service')return r.category==='폐기물처리용역';return ['장비구매','장비임차','부속·비품','유지보수'].includes(r.category)}
function records(){return DATA.records.filter(r=>r.market===state.market&&r.source===state.source&&viewMatch(r)&&((r.date||r.plan_month||'').slice(0,4)===state.year)&&(!state.q||[r.title,r.agency,r.company].join(' ').toLowerCase().includes(state.q)))}
function setUrl(){const p=new URLSearchParams({source:state.source,view:state.view,year:state.year});history.replaceState(null,'','?'+p.toString())}
function monthKey(){return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`}
function isEndingSoon(d){if(!d||d.length<8)return false;const x=new Date(+d.slice(0,4),+d.slice(4,6)-1,+d.slice(6,8));const end=new Date(now);end.setMonth(end.getMonth()+3);return x>=new Date(now.getFullYear(),now.getMonth(),now.getDate())&&x<=end}
function renderCards(arr){let cards=[];const cm=monthKey(), y=`${state.year}년`;if(state.source==='발주계획'){cards=[[`${y} 총 발주`,arr.length+'건',''],['이번 달 발주 예정',arr.filter(r=>(r.plan_month||'').startsWith(cm)).length+'건','현재 월 기준']]}else if(state.source==='공고'){cards=[[`${y} 총 공고`,arr.length+'건',''],['현재 공고 중',arr.filter(r=>r.open).length+'건','입찰서 마감일 기준'],['이번 달 공고금액',won(arr.filter(r=>(r.date||'').startsWith(cm)).reduce((s,r)=>s+(r.amount||0),0)),'공고일 기준']]}else{cards=[[`${y} 총 계약`,arr.length+'건',''],[`${y} 총 계약금액`,won(arr.reduce((s,r)=>s+(r.amount||0),0)),''],['이번 달 계약금액',won(arr.filter(r=>(r.date||'').startsWith(cm)).reduce((s,r)=>s+(r.amount||0),0)),'계약일 기준'],['3개월 내 계약만료',arr.filter(r=>isEndingSoon(r.end_date)).length+'건','오늘 이후 3개월']]}document.getElementById('cards').innerHTML=cards.map(c=>`<div class="card"><div class="label">${c[0]}</div><div class="value">${c[1]}</div><div class="sub">${c[2]}</div></div>`).join('')}
function actionButton(r){const payload=encodeURIComponent(JSON.stringify({title:r.title,url:r.url,market:r.market}));return `<button class="action" onclick="openChoice('${payload}')">조회</button>`}
let pendingAction=null;
function openChoice(payload){pendingAction=JSON.parse(decodeURIComponent(payload));document.getElementById('choiceTitle').textContent=pendingAction.title||'';document.getElementById('choiceModal').classList.add('open')}
function closeChoice(){document.getElementById('choiceModal').classList.remove('open');pendingAction=null}
function targetUrl(x){if(x.url)return x.url;if(x.market==='군수품')return 'https://www.d2b.go.kr/search.do';return 'https://www.g2b.go.kr/'}
async function runChoice(mode){const x=pendingAction;if(!x)return;if(mode==='copygo')await copyText(x.title||'');window.open(targetUrl(x),'_blank','noopener');closeChoice()}
async function copyText(t){try{await navigator.clipboard.writeText(t)}catch(e){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove()}const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)}
function sortValue(r,key){if(key==='amount')return Number(r.amount)||0;if(key==='date')return String(r.date||r.plan_month||'');return String(r[key]||'').toLowerCase()}
function setSort(key){if(state.sortKey===key)state.sortDir=state.sortDir==='asc'?'desc':'asc';else{state.sortKey=key;state.sortDir=key==='amount'||key==='date'?'desc':'asc'}render()}
function renderTable(arr){let defs,rows;if(state.source==='발주계획'){defs=[['title','사업명'],['agency','기관'],['category','분류'],['amount','금액'],['date','공고예정월'],[null,'바로가기']]}else if(state.source==='공고'){defs=[['title','사업명'],['agency','기관'],['category','분류'],['amount','금액'],['date','공고일'],['deadline','입찰서 마감일'],[null,'바로가기']]}else{defs=[['title','사업명'],['agency','기관'],['company','업체명'],['amount','계약금액'],['method','계약방법'],[null,'바로가기']]}
arr=[...arr].sort((a,b)=>{const av=sortValue(a,state.sortKey),bv=sortValue(b,state.sortKey);if(av===bv)return 0;const c=av>bv?1:-1;return state.sortDir==='asc'?c:-c});
if(state.source==='발주계획'){rows=arr.map(r=>`<tr><td class="title-cell">${esc(r.title)}</td><td class="clickable" onclick="openAgency('${encodeURIComponent(r.agency||'')}')">${esc(r.agency||'-')}</td><td>${esc(r.category)}</td><td class="num">${won(r.amount)}</td><td>${fmt(r.plan_month)}</td><td>${actionButton(r)}</td></tr>`)}else if(state.source==='공고'){rows=arr.map(r=>`<tr><td class="title-cell">${esc(r.title)}</td><td class="clickable" onclick="openAgency('${encodeURIComponent(r.agency||'')}')">${esc(r.agency||'-')}</td><td>${esc(r.category)}</td><td class="num">${won(r.amount)}</td><td>${fmt(r.date)}</td><td>${fmt(r.deadline)}</td><td>${actionButton(r)}</td></tr>`)}else{rows=arr.map(r=>`<tr><td class="title-cell">${esc(r.title)}</td><td class="clickable" onclick="openAgency('${encodeURIComponent(r.agency||'')}')">${esc(r.agency||'-')}</td><td class="clickable" onclick="openCompany('${encodeURIComponent(r.company||'')}')">${esc(r.company||'-')}</td><td class="num">${won(r.amount)}</td><td>${esc(r.method||'-')}</td><td>${actionButton(r)}</td></tr>`)}
const head=defs.map(([k,label])=>{if(!k)return `<th>${label}</th>`;const active=state.sortKey===k,mark=active?(state.sortDir==='asc'?'▲':'▼'):'';return `<th class="sortable" onclick="setSort('${k}')">${label}<span class="sort-mark">${mark}</span></th>`}).join('');document.getElementById('thead').innerHTML='<tr>'+head+'</tr>';document.getElementById('tbody').innerHTML=rows.length?rows.join(''):`<tr><td colspan="${defs.length}" class="empty">선택 조건에 해당하는 데이터가 없습니다.</td></tr>`}
function openAgency(enc){const name=decodeURIComponent(enc);if(!name)return;const arr=DATA.records.filter(r=>r.market===state.market&&r.agency===name&&viewMatch(r));const counts={발주계획:0,공고:0,계약정보:0};arr.forEach(r=>counts[r.source]=(counts[r.source]||0)+1);openDrawer(name,`<div class="drawer-stat"><div class="mini">발주계획<b>${counts.발주계획}건</b></div><div class="mini">공고<b>${counts.공고}건</b></div><div class="mini">계약정보<b>${counts.계약정보}건</b></div><div class="mini">누적금액<b>${won(arr.reduce((s,r)=>s+(r.amount||0),0))}</b></div></div>${recentHtml(arr)}`)}
function openCompany(enc){const name=decodeURIComponent(enc);if(!name)return;const arr=DATA.records.filter(r=>r.market===state.market&&r.source==='계약정보'&&r.company===name&&viewMatch(r));openDrawer(name,`<div class="drawer-stat"><div class="mini">계약 건수<b>${arr.length}건</b></div><div class="mini">계약금액<b>${won(arr.reduce((s,r)=>s+(r.amount||0),0))}</b></div></div>${recentHtml(arr)}`)}
function recentHtml(arr){arr=[...arr].sort((a,b)=>String(b.date||b.plan_month||'').localeCompare(String(a.date||a.plan_month||''))).slice(0,15);return `<div class="recent"><h4>최근 내역</h4>${arr.map(r=>`<div class="recent-item"><div class="recent-title">${esc(r.title)}</div><div class="recent-meta">${esc(r.source)} · ${fmt(r.date||r.plan_month)} · ${won(r.amount)}</div></div>`).join('')||'<div class="empty">내역이 없습니다.</div>'}</div>`}
function openDrawer(title,html){document.getElementById('drawerTitle').textContent=title;document.getElementById('drawerBody').innerHTML=html;document.getElementById('drawer').classList.add('open')}function closeDrawer(){document.getElementById('drawer').classList.remove('open')}
function render(){document.querySelectorAll('.market-btn').forEach(b=>b.classList.toggle('active',b.dataset.market===state.market));document.querySelectorAll('.stage-btn').forEach(b=>b.classList.toggle('active',b.dataset.source===state.source));document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));document.getElementById('pageTitle').textContent=`${state.market} 음식물 조달`;document.getElementById('listTitle').textContent=`${state.year}년 ${state.source} 세부 내역`;document.getElementById('listSub').textContent='최근순에서 오래된 순으로 표시합니다.';const arr=records();renderCards(arr);renderTable(arr);setUrl()}
function init(){const p=new URLSearchParams(location.search);state.market=FIXED_MARKET;state.source=p.get('source')||'발주계획';state.view=p.get('view')||'equipment';const years=DATA.years?.length?DATA.years:[String(now.getFullYear())];state.year=p.get('year')||years[0];const y=document.getElementById('year');y.innerHTML=years.map(v=>`<option value="${v}">${v}년</option>`).join('');y.value=state.year;document.querySelectorAll('.stage-btn').forEach(b=>b.onclick=()=>{state.source=b.dataset.source;render()});document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render()});y.onchange=()=>{state.year=y.value;render()};document.getElementById('search').oninput=e=>{state.q=e.target.value.trim().toLowerCase();render()};document.getElementById('updated').textContent=`최종 갱신 ${DATA.updated_at||'-'}`;render()}
fetch('data/summary.json').then(r=>r.json()).catch(()=>fetch('data.json').then(r=>r.json())).then(d=>{DATA=d;init()}).catch(e=>{document.getElementById('updated').textContent='데이터를 불러오지 못했습니다.';console.error(e)})
</script></body></html>
