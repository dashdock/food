<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>군수품 음식물 처리기 조달시장</title><style>
:root{--navy:#0f2747;--blue:#2563eb;--text:#111827;--dim:#64748b;--line:#dbe4ef;--soft:#f8fafc;--green:#087f5b;--amber:#b45309;--sans:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:#f7f9fc;color:var(--text);font-family:var(--sans)}button,select,input{font:inherit}a{font:inherit;text-decoration:none;text-align:center}.shell{max-width:1380px;margin:auto;padding:20px 16px 60px}.market-nav{display:grid;grid-template-columns:1fr 1fr;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 24px rgba(15,39,71,.06)}.market-btn{border:0;background:#fff;padding:22px 16px;font-size:20px;font-weight:900;color:#64748b;cursor:pointer}.market-btn+.market-btn{border-left:1px solid var(--line)}.market-btn.active{background:var(--navy);color:#fff}.header{padding:24px 2px 16px}.header h1{margin:0;color:var(--navy);font-size:30px}.meta{margin-top:7px;color:var(--dim);font-size:13px}.controls{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}.year{padding:10px 38px 10px 12px;border:1px solid #cbd5e1;border-radius:9px;font-weight:800;color:var(--navy)}.seg{display:flex;gap:6px;flex-wrap:wrap}.chip,.stage-btn{border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:999px;padding:9px 15px;font-weight:800;cursor:pointer}.chip.active{background:#e8f0ff;border-color:#93b4dc;color:var(--blue)}.stage-nav{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px;display:grid;grid-template-columns:repeat(var(--stage-count),1fr);gap:8px}.stage-btn{border-radius:10px;padding:13px}.stage-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}.summary-title{font-size:14px;font-weight:900;color:var(--navy);margin:22px 0 10px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:17px;min-height:108px}.card.click-card{cursor:pointer;transition:.16s;box-shadow:0 2px 10px rgba(15,39,71,.03)}.card.click-card:hover{transform:translateY(-2px);border-color:#93b4dc;box-shadow:0 9px 22px rgba(15,39,71,.1)}.card .label{font-size:12px;color:var(--dim);font-weight:800}.card .value{font:900 25px var(--mono);color:var(--navy);margin-top:9px}.card .sub{font-size:11px;color:var(--dim);margin-top:5px}.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.top-panel{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}.top-head{padding:15px 17px;border-bottom:1px solid var(--line)}.top-head h3{margin:0;color:var(--navy);font-size:16px}.top-head p{margin:4px 0 0;color:var(--dim);font-size:11px}.rank-list{padding:5px 16px 12px}.rank-row{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:9px;align-items:center;padding:10px 0;border-bottom:1px solid #edf2f7}.rank-row:last-child{border-bottom:0}.rank-no{font:900 13px var(--mono);color:#94a3b8}.rank-name{border:0;background:transparent;padding:0;text-align:left;color:var(--blue);font-weight:800;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.rank-value{font:800 12px var(--mono);white-space:nowrap}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;margin-top:16px;overflow:hidden}.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}.panel-head h2{margin:0;color:var(--navy);font-size:17px}.panel-head p{margin:3px 0 0;color:var(--dim);font-size:12px}.panel-actions{display:flex;gap:8px;align-items:center}.toggle-detail{border:1px solid #cbd5e1;background:#fff;color:var(--navy);border-radius:9px;padding:9px 13px;font-weight:900;cursor:pointer}.search{width:min(340px,100%);padding:9px 11px;border:1px solid #cbd5e1;border-radius:9px}.detail-body.collapsed{display:none}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:900px}.table th,.table td{padding:12px 10px;border-bottom:1px solid #edf2f7;text-align:left;font-size:12px;vertical-align:middle}.table th{background:#f8fafc;color:#475569;font-weight:900;position:sticky;top:0;text-align:center;white-space:nowrap}.table th.sortable{cursor:pointer;user-select:none}.table th.sortable:hover{background:#eef4fb}.sort-mark{margin-left:4px;color:#94a3b8;font-size:10px}.title-cell{font-weight:800;color:var(--navy);max-width:430px}.clickable{color:var(--blue);cursor:pointer;text-decoration:underline;text-decoration-color:#bfdbfe;text-underline-offset:3px}.num{text-align:right!important;font-family:var(--mono);font-weight:800;white-space:nowrap}.action{border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:8px;padding:7px 10px;font-weight:900;cursor:pointer;white-space:nowrap}.empty{text-align:center;padding:35px!important;color:var(--dim)}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:9px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:120}.toast.show{opacity:1}.modal{position:fixed;inset:0;display:none;z-index:90;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.45)}.modal-box{position:relative;width:min(1120px,96vw);max-height:90vh;background:#fff;border-radius:16px;box-shadow:0 24px 70px rgba(15,23,42,.28);overflow:hidden;display:flex;flex-direction:column}.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.modal-head h3{margin:0;color:var(--navy);font-size:18px}.modal-head p{margin:5px 0 0;color:var(--dim);font-size:12px}.close{border:0;background:#f1f5f9;border-radius:8px;width:36px;height:36px;font-size:22px;cursor:pointer;flex:none}.modal-body{overflow:auto}.modal-summary{padding:14px 20px;border-bottom:1px solid var(--line);font-size:13px;color:var(--dim)}.modal-summary b{color:var(--navy)}.choice-modal{position:fixed;inset:0;display:none;z-index:110;align-items:center;justify-content:center}.choice-modal.open{display:flex}.choice-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.4)}.choice-box{position:relative;width:min(380px,calc(100vw - 32px));background:#fff;border-radius:16px;padding:22px;box-shadow:0 24px 60px rgba(15,23,42,.25)}.choice-box h3{margin:0 0 8px;color:var(--navy)}.choice-box p{margin:0 0 18px;color:var(--dim);font-size:13px;line-height:1.5}.choice-actions{display:grid;gap:8px}.choice-btn{border:1px solid #cbd5e1;background:#fff;border-radius:9px;padding:11px;font-weight:900;cursor:pointer}.choice-btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}.choice-btn.blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}.top-grid{grid-template-columns:1fr}}@media(max-width:620px){.shell{padding:10px 8px 40px}.market-btn{font-size:17px;padding:17px 8px}.header h1{font-size:24px}.stage-nav{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.controls{align-items:stretch}.year{width:100%}.panel-head{display:block}.panel-actions{margin-top:10px;display:grid}.search{width:100%}.modal{padding:7px}}
</style></head>
<body style="--stage-count:3"><main class="shell">
<nav class="market-nav"><a class="market-btn" data-market="군수품" href="military.html">군수품</a><a class="market-btn" data-market="나라장터" href="g2b.html">나라장터</a></nav>
<header class="header"><h1 id="pageTitle">군수품 음식물 처리기 조달</h1><div class="meta" id="updated">데이터 불러오는 중...</div></header>
<section class="controls"><select id="year" class="year"></select><div class="seg"><button class="chip active" data-view="equipment">장비</button><button class="chip" data-view="service">처리용역</button><button class="chip" data-view="other">기타음식물</button><button class="chip" data-view="all">전체</button></div></section>
<nav class="stage-nav"><button class="stage-btn active" data-source="발주계획">발주계획</button><button class="stage-btn" data-source="공고">공고</button><button class="stage-btn" data-source="계약정보">계약정보</button></nav>
<div class="summary-title">요약</div><section class="cards" id="cards"></section>
<section class="top-grid" id="topGrid" hidden></section>
<section class="panel"><div class="panel-head"><div><h2 id="listTitle">세부 내역</h2><p id="listSub">최근순으로 표시합니다.</p></div><div class="panel-actions"><input id="search" class="search" placeholder="사업명, 기관, 업체명 검색"><button id="toggleDetail" class="toggle-detail" onclick="toggleDetails()" hidden>세부내역 펼치기</button></div></div><div class="detail-body" id="detailBody"><div id="detailTable"></div></div></section>
</main><div class="toast" id="toast">복사되었습니다.</div><div class="choice-modal" id="choiceModal"><div class="choice-backdrop" onclick="closeChoice()"></div><div class="choice-box"><h3>바로가기</h3><p id="choiceTitle"></p><div class="choice-actions"><button class="choice-btn primary" onclick="runChoice('copygo')">복사 후 이동</button><button class="choice-btn blue" onclick="runChoice('go')">이동</button><button class="choice-btn" onclick="closeChoice()">취소</button></div></div></div>
<div class="modal" id="listModal"><div class="modal-backdrop" onclick="closeList()"></div><section class="modal-box"><div class="modal-head"><div><h3 id="modalTitle"></h3><p id="modalSub"></p></div><button class="close" onclick="closeList()">×</button></div><div class="modal-summary" id="modalSummary"></div><div class="modal-body" id="modalBody"></div></section></div>
<script>
const FIXED_MARKET='군수품';
const HAS_PLAN=FIXED_MARKET==='군수품';
let DATA={records:[],years:[]};
let state={sortKey:'date',sortDir:'desc',market:FIXED_MARKET,source:HAS_PLAN?'발주계획':'공고',view:'equipment',year:'',q:'',detailOpen:true};
let pendingAction=null;
const now=new Date();
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const won=n=>{n=Number(n)||0;if(!n)return '-';if(n>=1e8)return (n/1e8).toLocaleString('ko-KR',{maximumFractionDigits:1})+'억원';if(n>=1e4)return Math.round(n/1e4).toLocaleString('ko-KR')+'만원';return n.toLocaleString('ko-KR')+'원'};
const fmt=d=>{d=String(d||'');if(d.length>=8)return `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;if(d.length>=6)return `${d.slice(0,4)}.${d.slice(4,6)}`;return '-'};
const yearOf=r=>String(r.date||r.plan_month||'').slice(0,4);
function viewMatch(r){if(state.view==='all')return true;if(state.view==='service')return r.category==='처리용역';if(state.view==='other')return r.category==='기타음식물';return r.category==='장비'}
function baseRecords(source=state.source){return DATA.records.filter(r=>r.market===state.market&&r.source===source&&viewMatch(r)&&yearOf(r)===state.year)}
function records(){return baseRecords().filter(r=>!state.q||[r.title,r.agency,r.company].join(' ').toLowerCase().includes(state.q))}
function setUrl(){const p=new URLSearchParams({source:state.source,view:state.view,year:state.year});history.replaceState(null,'','?'+p.toString())}
function monthKey(){return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`}
function isEndingSoon(d){if(!d||String(d).length<8)return false;d=String(d);const x=new Date(+d.slice(0,4),+d.slice(4,6)-1,+d.slice(6,8));const start=new Date(now.getFullYear(),now.getMonth(),now.getDate());const end=new Date(start);end.setMonth(end.getMonth()+3);return x>=start&&x<=end}
function cardHtml(label,value,sub,filterKey=''){return `<div class="card ${filterKey?'click-card':''}" ${filterKey?`role="button" tabindex="0" onclick="openCard('${filterKey}')" onkeydown="if(event.key==='Enter'||event.key===' ')openCard('${filterKey}')"`:''}><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub||''}</div></div>`}
function cardFilter(key,arr){const cm=monthKey();if(key==='monthPlan')return arr.filter(r=>(r.plan_month||'').startsWith(cm));if(key==='openBid')return arr.filter(r=>r.open);if(key==='monthContract')return arr.filter(r=>(r.date||'').startsWith(cm));if(key==='endingSoon')return arr.filter(r=>isEndingSoon(r.end_date));return arr}
function cardTitle(key){return {monthPlan:'이번 달 발주 예정',openBid:'현재 공고 중',monthContract:'이번 달 계약금액',endingSoon:'3개월 내 계약만료'}[key]||'세부 내역'}
function renderCards(arr){const y=`${state.year}년`;let html='';if(state.source==='발주계획'){html+=cardHtml(`${y} 총 발주`,arr.length+'건','');const x=cardFilter('monthPlan',arr);html+=cardHtml('이번 달 발주 예정',x.length+'건','현재 월 기준','monthPlan')}else if(state.source==='공고'){html+=cardHtml(`${y} 총 공고`,arr.length+'건','');const x=cardFilter('openBid',arr);html+=cardHtml('현재 공고 중',x.length+'건','입찰서 마감일 기준','openBid');html+=cardHtml('이번 달 공고금액',won(arr.filter(r=>(r.date||'').startsWith(monthKey())).reduce((s,r)=>s+(r.amount||0),0)),'공고일 기준')}else{html+=cardHtml(`${y} 총 계약`,arr.length+'건','');html+=cardHtml(`${y} 총 계약금액`,won(arr.reduce((s,r)=>s+(r.amount||0),0)),'');const month=cardFilter('monthContract',arr),ending=cardFilter('endingSoon',arr);html+=cardHtml('이번 달 계약금액',won(month.reduce((s,r)=>s+(r.amount||0),0)),`${month.length}건 · 계약일 기준`,'monthContract');html+=cardHtml('3개월 내 계약만료',ending.length+'건','오늘 이후 3개월','endingSoon')}document.getElementById('cards').innerHTML=html}
function top10(arr,key){const map=new Map();arr.forEach(r=>{const name=String(r[key]||'').trim();if(!name)return;const x=map.get(name)||{name,amount:0,count:0};x.amount+=Number(r.amount)||0;x.count+=1;map.set(name,x)});return [...map.values()].sort((a,b)=>b.amount-a.amount||b.count-a.count||a.name.localeCompare(b.name,'ko')).slice(0,10)}
function rankPanel(title,items,type){return `<section class="top-panel"><div class="top-head"><h3>${title}</h3><p>${state.year}년 계약금액 합계 기준</p></div><div class="rank-list">${items.length?items.map((x,i)=>`<div class="rank-row"><span class="rank-no">${i+1}</span><button class="rank-name" title="${esc(x.name)}" onclick="openTop('${type}','${encodeURIComponent(x.name)}')">${esc(x.name)}</button><span class="rank-value">${won(x.amount)} · ${x.count}건</span></div>`).join(''):'<div class="empty">계약 내역이 없습니다.</div>'}</div></section>`}
function renderTop(){const box=document.getElementById('topGrid');if(state.source!=='계약정보'){box.hidden=true;box.innerHTML='';return}const arr=baseRecords('계약정보');box.hidden=false;box.innerHTML=rankPanel('기관 TOP10',top10(arr,'agency'),'agency')+rankPanel('업체 TOP10',top10(arr,'company'),'company')}
function actionButton(r){if(FIXED_MARKET==='군수품'){const payload=encodeURIComponent(JSON.stringify({title:r.title,url:r.url,market:r.market}));return `<button class="action" onclick="openChoice('${payload}')">조회</button>`}const url=encodeURIComponent(r.url||'');return `<button class="action" onclick="goToUrl('${url}')">이동</button>`}
function goToUrl(encodedUrl){const url=decodeURIComponent(encodedUrl||'');if(!url){alert('이동 URL이 없습니다.');return}window.open(url,'_blank','noopener')}
function openChoice(payload){pendingAction=JSON.parse(decodeURIComponent(payload));document.getElementById('choiceTitle').textContent=pendingAction.title||'';document.getElementById('choiceModal').classList.add('open')}
function closeChoice(){document.getElementById('choiceModal').classList.remove('open');pendingAction=null}
function targetUrl(x){return x.url||'https://www.d2b.go.kr/search.do'}
async function runChoice(mode){const x=pendingAction;if(!x)return;if(mode==='copygo')await copyText(x.title||'');window.open(targetUrl(x),'_blank','noopener');closeChoice()}
async function copyText(t){try{await navigator.clipboard.writeText(t)}catch(e){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove()}const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)}
function sortValue(r,key){if(key==='amount')return Number(r.amount)||0;if(key==='date')return String(r.date||r.plan_month||'');return String(r[key]||'').toLowerCase()}
function sorted(arr){return [...arr].sort((a,b)=>{const av=sortValue(a,state.sortKey),bv=sortValue(b,state.sortKey);if(av===bv)return 0;const c=av>bv?1:-1;return state.sortDir==='asc'?c:-c})}
function setSort(key){if(state.sortKey===key)state.sortDir=state.sortDir==='asc'?'desc':'asc';else{state.sortKey=key;state.sortDir=key==='amount'||key==='date'?'desc':'asc'}renderTable(records())}
function tableDefs(source){if(source==='발주계획')return [['title','사업명'],['agency','기관'],['category','분류'],['amount','금액'],['date','공고예정월'],[null,'바로가기']];if(source==='공고')return [['title','사업명'],['agency','기관'],['category','분류'],['amount','금액'],['date','공고일'],['deadline','입찰서 마감일'],[null,'바로가기']];return [['title','사업명'],['agency','기관'],['company','업체명'],['amount','계약금액'],['method','계약방법'],['date','계약일'],['end_date','계약종료일'],[null,'바로가기']]}
function rowHtml(r,source){if(source==='발주계획')return `<tr><td class="title-cell">${esc(r.title)}</td><td>${esc(r.agency||'-')}</td><td>${esc(r.category)}</td><td class="num">${won(r.amount)}</td><td>${fmt(r.plan_month)}</td><td>${actionButton(r)}</td></tr>`;if(source==='공고')return `<tr><td class="title-cell">${esc(r.title)}</td><td>${esc(r.agency||'-')}</td><td>${esc(r.category)}</td><td class="num">${won(r.amount)}</td><td>${fmt(r.date)}</td><td>${fmt(r.deadline)}</td><td>${actionButton(r)}</td></tr>`;return `<tr><td class="title-cell">${esc(r.title)}</td><td class="clickable" onclick="openTop('agency','${encodeURIComponent(r.agency||'')}')">${esc(r.agency||'-')}</td><td class="clickable" onclick="openTop('company','${encodeURIComponent(r.company||'')}')">${esc(r.company||'-')}</td><td class="num">${won(r.amount)}</td><td>${esc(r.method||'-')}</td><td>${fmt(r.date)}</td><td>${fmt(r.end_date)}</td><td>${actionButton(r)}</td></tr>`}
function tableMarkup(arr,source=state.source,sortable=true){const defs=tableDefs(source);const data=sortable?sorted(arr):[...arr].sort((a,b)=>String(b.date||b.plan_month||'').localeCompare(String(a.date||a.plan_month||'')));const head=defs.map(([k,label])=>{if(!k||!sortable)return `<th>${label}</th>`;const mark=state.sortKey===k?(state.sortDir==='asc'?'▲':'▼'):'';return `<th class="sortable" onclick="setSort('${k}')">${label}<span class="sort-mark">${mark}</span></th>`}).join('');const rows=data.map(r=>rowHtml(r,source)).join('');return `<div class="table-wrap"><table class="table"><thead><tr>${head}</tr></thead><tbody>${rows||`<tr><td colspan="${defs.length}" class="empty">선택 조건에 해당하는 데이터가 없습니다.</td></tr>`}</tbody></table></div>`}
function renderTable(arr){const host=document.getElementById('detailTable');host.innerHTML=tableMarkup(arr,state.source,true)}
function openList(title,arr,source=state.source){document.getElementById('modalTitle').textContent=title;document.getElementById('modalSub').textContent=`${state.year}년 · ${arr.length.toLocaleString()}건`;document.getElementById('modalSummary').innerHTML=`총 <b>${arr.length.toLocaleString()}건</b> · 금액 합계 <b>${won(arr.reduce((s,r)=>s+(r.amount||0),0))}</b>`;document.getElementById('modalBody').innerHTML=tableMarkup(arr,source,false);document.getElementById('listModal').classList.add('open')}
function closeList(){document.getElementById('listModal').classList.remove('open')}
function openCard(key){const arr=cardFilter(key,baseRecords());openList(cardTitle(key),arr,state.source)}
function openTop(type,enc){const name=decodeURIComponent(enc);if(!name)return;const arr=baseRecords('계약정보').filter(r=>String(r[type]||'').trim()===name);openList(`${name} · ${state.year}년 계약`,arr,'계약정보')}
function toggleDetails(){state.detailOpen=!state.detailOpen;applyDetailState()}
function applyDetailState(){const shouldCollapse=state.source==='계약정보'&&!state.detailOpen;document.getElementById('detailBody').classList.toggle('collapsed',shouldCollapse);const btn=document.getElementById('toggleDetail');btn.hidden=state.source!=='계약정보';btn.textContent=shouldCollapse?'세부내역 펼치기':'세부내역 접기'}
function render(){document.querySelectorAll('.market-btn').forEach(b=>b.classList.toggle('active',b.dataset.market===state.market));document.querySelectorAll('.stage-btn').forEach(b=>b.classList.toggle('active',b.dataset.source===state.source));document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));document.getElementById('pageTitle').textContent=`${state.market} 음식물 조달`;document.getElementById('listTitle').textContent=`${state.year}년 ${state.source} 세부 내역`;document.getElementById('listSub').textContent='최근순에서 오래된 순으로 표시합니다.';const arr=records();renderCards(baseRecords());renderTop();renderTable(arr);applyDetailState();setUrl()}
function init(){const p=new URLSearchParams(location.search);state.market=FIXED_MARKET;const allowed=HAS_PLAN?['발주계획','공고','계약정보']:['공고','계약정보'];state.source=allowed.includes(p.get('source'))?p.get('source'):allowed[0];state.view=['equipment','service','other','all'].includes(p.get('view'))?p.get('view'):'equipment';const years=DATA.years?.length?DATA.years:[String(now.getFullYear())];state.year=years.includes(p.get('year'))?p.get('year'):years[0];state.detailOpen=state.source!=='계약정보';const y=document.getElementById('year');y.innerHTML=years.map(v=>`<option value="${v}">${v}년</option>`).join('');y.value=state.year;document.querySelectorAll('.stage-btn').forEach(b=>b.onclick=()=>{state.source=b.dataset.source;state.q='';document.getElementById('search').value='';state.detailOpen=state.source!=='계약정보';render()});document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render()});y.onchange=()=>{state.year=y.value;render()};document.getElementById('search').oninput=e=>{state.q=e.target.value.trim().toLowerCase();renderTable(records())};document.getElementById('updated').textContent=`최종 갱신 ${DATA.updated_at||'-'}`;render()}
fetch('data/summary.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).catch(()=>fetch('data.json').then(r=>r.json())).then(d=>{DATA=d;init()}).catch(e=>{document.getElementById('updated').textContent='데이터를 불러오지 못했습니다.';console.error(e)})
</script></body></html>
